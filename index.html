<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sputnik Studio v7.0 — AV Project Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Стили для топбара */
        .topbar {
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border-light);
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 30;
        }
        .topbar-logo {
            font-weight: 600;
            font-size: 1.2rem;
            color: var(--accent);
        }
        .topbar-nav {
            display: flex;
            gap: 8px;
            background: var(--card-bg);
            border-radius: 40px;
            padding: 4px;
        }
        .topbar-btn {
            border: none;
            background: transparent;
            padding: 6px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
            color: var(--text-primary);
        }
        .topbar-btn.active {
            background: var(--accent);
            color: white;
        }
        .topbar-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .topbar-actions button {
            background: transparent;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: 0.2s;
        }
        .topbar-actions button:hover {
            color: var(--accent);
        }
        /* Контейнеры для разделов */
        .section-container {
            display: none;
            padding: 24px;
        }
        .section-container.active {
            display: block;
        }
        /* Скрываем сайдбар по умолчанию, показываем только в разделе "Расчёты" */
        .sidebar.hidden {
            display: none;
        }
        .main-content.full-width {
            max-width: 100%;
            margin-left: 0;
        }
    </style>
</head>
<body>
<div class="topbar">
    <div class="topbar-logo"><i class="fas fa-satellite-dish"></i> Sputnik Studio</div>
    <div class="topbar-nav" id="topbarNav">
        <button class="topbar-btn active" data-section="dashboard">Главная</button>
        <button class="topbar-btn" data-section="calculations">Расчёты</button>
        <button class="topbar-btn" data-section="projects">Проекты</button>
        <button class="topbar-btn" data-section="templates">Шаблоны</button>
    </div>
    <div class="topbar-actions">
        <button id="topbarThemeSwitch" title="Тема"><i class="fas fa-sun"></i></button>
        <button id="topbarSave" title="Сохранить"><i class="fas fa-save"></i></button>
        <button id="topbarExport" title="Экспорт"><i class="fas fa-file-export"></i></button>
    </div>
</div>
<div class="app-layout">
    <!-- Сайдбар (изначально скрыт, показывается только в разделе "Расчёты") -->
    <div class="sidebar hidden" id="sidebar">
        <div class="sidebar-header">
            <h2>SPUTNIK STUDIO</h2>
            <div class="header-actions">
                <div class="theme-switch" id="themeSwitch"><i class="fas fa-sun"></i></div>
                <div class="collapse-btn" id="collapseSidebarBtn"><i class="fas fa-chevron-left"></i></div>
            </div>
        </div>
        <div id="sidebarSectionsContainer">
            <!-- Все секции сайдбара (видео, сеть, LED, звук, ВКС, эргономика, тракты, статистика, энергия, управление) -->
            <!-- Содержимое такое же, как в предыдущей версии, но для краткости я его не дублирую -->
            <!-- Вы можете скопировать его из предыдущего index.html -->
        </div>
        <div class="sidebar-footer">Sputnik Studio v7.0<br>© 2026</div>
    </div>

    <div class="main-content" id="mainContent">
        <!-- Дашборд (Главная) -->
        <div id="dashboardContainer" class="section-container active">
            <h2>Панель управления</h2>
            <div class="dashboard-stats">
                <div class="stat-card">
                    <i class="fas fa-project-diagram"></i>
                    <div class="stat-number" id="dashboardProjectsCount">0</div>
                    <div class="stat-label">Проектов</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-chart-line"></i>
                    <div class="stat-number" id="dashboardAvgProgress">0%</div>
                    <div class="stat-label">Средний прогресс</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-users"></i>
                    <div class="stat-number" id="dashboardTeamCount">0</div>
                    <div class="stat-label">Коллег в сети</div>
                </div>
            </div>
            <div class="recent-projects">
                <h3>Недавние проекты</h3>
                <div id="recentProjectsList" class="projects-list"></div>
            </div>
        </div>

        <!-- Контейнер для расчётов (в нём будет отображаться текущий калькулятор/тракты) -->
        <div id="calculationsContainer" class="section-container">
            <div id="activePathContainer" class="active-path-container"></div>
            <div id="allTractsContainer" style="display: none;"></div>
            <div id="ergoCalculatorContainer" style="display: none;"></div>
            <div id="soundCalculatorContainer" style="display: none;"></div>
            <div id="ledCalculatorContainer" style="display: none;"></div>
            <div id="vcCalculatorContainer" style="display: none;"></div>
            <div id="powerCalculatorContainer" style="display: none;"></div>
        </div>

        <!-- Управление проектами -->
        <div id="projectsContainer" class="section-container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h2>Управление проектами</h2>
                <button class="btn-primary" id="createProjectBtn"><i class="fas fa-plus"></i> Новый проект</button>
            </div>
            <div id="projectsList" class="projects-list"></div>
        </div>

        <!-- Шаблоны документов -->
        <div id="templatesContainer" class="section-container">
            <h2>Конструктор документов</h2>
            <div class="template-builder">
                <div class="setting">
                    <label>Выберите шаблон:</label>
                    <select id="templateSelect">
                        <option value="explanatory">Пояснительная записка</option>
                        <option value="specification">Спецификация оборудования</option>
                        <option value="act">Акт выполненных работ</option>
                    </select>
                </div>
                <div class="setting">
                    <label>Подсистемы проекта:</label>
                    <div id="subsystemsChecklist">
                        <label><input type="checkbox" value="display"> Подсистема отображения</label>
                        <label><input type="checkbox" value="vks"> ВКС</label>
                        <label><input type="checkbox" value="sound"> Звукоусиление</label>
                        <label><input type="checkbox" value="led"> LED-экраны</label>
                        <label><input type="checkbox" value="control"> Управление</label>
                    </div>
                </div>
                <div class="setting">
                    <label>Привязать к проекту:</label>
                    <select id="templateProjectSelect">
                        <option value="">— Не привязывать —</option>
                    </select>
                </div>
                <button class="btn-primary" id="generateDocBtn"><i class="fas fa-file-alt"></i> Сформировать документ</button>
                <div id="documentPreview" class="document-preview" style="margin-top: 24px; display: none;">
                    <h3>Предварительный просмотр</h3>
                    <div id="previewContent"></div>
                    <button class="btn-secondary" id="copyDocBtn"><i class="fas fa-copy"></i> Копировать текст</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
<script src="js/state.js"></script>
<script src="js/utils.js"></script>
<script src="js/accordion.js"></script>
<script src="js/video.js"></script>
<script src="js/network.js"></script>
<script src="js/tracts.js"></script>
<script src="js/led.js"></script>
<script src="js/sound.js"></script>
<script src="js/vc.js"></script>
<script src="js/ergo.js"></script>
<script src="js/power.js"></script>
<script src="js/storage.js"></script>
<script src="js/logger.js"></script>
<script src="js/sidebar-editor.js"></script>
<script src="js/topbar.js"></script>
<script src="js/app.js"></script>
</body>
</html>
